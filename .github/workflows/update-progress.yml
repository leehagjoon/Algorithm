name: Update and Organize Algorithm Repository

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  organize-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Organize Folders (Move to Subdirectories)
        run: |
          # 1. 'HackerRank'가 포함된 폴더 중 이미 HackerRank/ 안에 있지 않은 폴더들을 찾아서 이동
          # 예: "1234-problem-HackerRank" -> "HackerRank/1234-problem-HackerRank"
          mkdir -p HackerRank
          find . -maxdepth 1 -type d -iname "*HackerRank*" ! -name "HackerRank" -exec mv {} HackerRank/ \;

          # 2. leetcode 관련 폴더도 정리하고 싶다면 아래 주석 해제
          # mkdir -p leetcode
          # find . -maxdepth 1 -type d -iname "*leetcode*" ! -name "leetcode" -exec mv {} leetcode/ \;

      - name: Count solved problems
        id: counts
        run: |
          # 1. HackerRank 폴더가 있는지 확인 후 카운트 (없으면 0)
          if [ -d "HackerRank" ]; then
            # -iname으로 대소문자 무시, 하위 폴더 전체 검색
            HR=$(find HackerRank -type f \( -iname "*.sql" -o -iname "*.java" -o -iname "*.py" \) | wc -l)
          else
            HR=0
          fi

          # 2. leetcode 폴더 확인 및 카운트
          if [ -d "leetcode" ]; then
            LC=$(find leetcode -type f \( -iname "*.sql" -o -iname "*.java" -o -iname "*.py" \) | wc -l)
          else
            LC=0
          fi

          # 3. 백준 및 프로그래머스 (한글 폴더명 대응)
          BJ=$(find . -type f -path "*백준*" \( -iname "*.sql" -o -iname "*.java" -o -iname "*.py" \) | wc -l)
          PG=$(find . -type f -path "*프로그래머스*" \( -iname "*.sql" -o -iname "*.java" -o -iname "*.py" \) | wc -l)

          # 디버깅용 출력 (Actions 로그에서 확인 가능)
          echo "Final Counts -> HR: $HR, LC: $LC, BJ: $BJ, PG: $PG"

          echo "HR=$HR" >> $GITHUB_ENV
          echo "LC=$LC" >> $GITHUB_ENV
          echo "BJ=$BJ" >> $GITHUB_ENV
          echo "PG=$PG" >> $GITHUB_ENV

      - name: Update README.md
        run: |
          sed -i "s/| HackerRank[[:space:]]*| .*/| HackerRank  | $HR      |/" README.md
          sed -i "s/| LeetCode[[:space:]]*| .*/| LeetCode    | $LC      |/" README.md
          sed -i "s/| Baekjoon[[:space:]]*| .*/| Baekjoon    | $BJ      |/" README.md
          sed -i "s/| Programmers[[:space:]]*| .*/| Programmers | $PG      |/" README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "📂 Organize folders and 📊 Update solved count"
            git push
          else
            echo "No changes to commit"
          fi
