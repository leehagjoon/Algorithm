name: Update Algorithm Progress

on:
  push:
    paths:
      - 'leetcode/**'
      - 'HackerRank/**'
      - '백준/**'
      - '프로그래머스/**'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Count LeetCode
        run: |
          LC=$(find leetcode -type f \( -name "*.java" -o -name "*.py" -o -name "*.sql" \) 2>/dev/null | wc -l)
          echo "LC=$LC" >> $GITHUB_ENV

      - name: Count HackerRank
        run: |
          HR=$(find HackerRank -type f | wc -l)
          echo "HR=$HR" >> $GITHUB_ENV

      - name: Count Baekjoon
        run: |
          BJ=$(find 백준 -type f | wc -l)
          echo "BJ=$BJ" >> $GITHUB_ENV

      - name: Count Programmers
        run: |
          PG=$(find 프로그래머스 -type f | wc -l)
          echo "PG=$PG" >> $GITHUB_ENV

      - name: Update README
        run: |
          sed -i "s/| LeetCode *| *[0-9]*/| LeetCode     | $LC/" README.md
          sed -i "s/| HackerRank *| *[0-9]*/| HackerRank   | $HR/" README.md
          sed -i "s/| Baekjoon *| *[0-9]*/| Baekjoon     | $BJ/" README.md
          sed -i "s/| Programmers *| *[0-9]*/| Programmers  | $PG/" README.md

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "auto: update progress" || echo "No changes"
          git push
