name: Update and Organize Algorithm Repository

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  organize-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Organize Folders (Move to Subdirectories)
        run: |
          # 1. 'HackerRank'가 포함된 폴더 중 이미 HackerRank/ 안에 있지 않은 폴더들을 찾아서 이동
          # 예: "1234-problem-HackerRank" -> "HackerRank/1234-problem-HackerRank"
          mkdir -p HackerRank
          find . -maxdepth 1 -type d -iname "*HackerRank*" ! -name "HackerRank" -exec mv {} HackerRank/ \;

          # 2. leetcode 관련 폴더도 정리하고 싶다면 아래 주석 해제
          # mkdir -p leetcode
          # find . -maxdepth 1 -type d -iname "*leetcode*" ! -name "leetcode" -exec mv {} leetcode/ \;

      - name: Count solved problems
        id: counts
        run: |
          HR=$(find HackerRank -type f \( -name "*.sql" -o -name "*.java" -o -name "*.py" \) | wc -l)
          LC=$(find leetcode -type f \( -name "*.sql" -o -name "*.java" -o -name "*.py" \) | wc -l)
          BJ=$(find 백준 -type f \( -name "*.sql" -o -name "*.java" -o -name "*.py" \) | wc -l)
          PG=$(find 프로그래머스 -type f \( -name "*.sql" -o -name "*.java" -o -name "*.py" \) | wc -l)

          echo "HR=$HR" >> $GITHUB_ENV
          echo "LC=$LC" >> $GITHUB_ENV
          echo "BJ=$BJ" >> $GITHUB_ENV
          echo "PG=$PG" >> $GITHUB_ENV

      - name: Update README.md
        run: |
          sed -i "s/| HackerRank[[:space:]]*| .*/| HackerRank  | $HR      |/" README.md
          sed -i "s/| LeetCode[[:space:]]*| .*/| LeetCode    | $LC      |/" README.md
          sed -i "s/| Baekjoon[[:space:]]*| .*/| Baekjoon    | $BJ      |/" README.md
          sed -i "s/| Programmers[[:space:]]*| .*/| Programmers | $PG      |/" README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "📂 Organize folders and 📊 Update solved count"
            git push
          else
            echo "No changes to commit"
          fi
