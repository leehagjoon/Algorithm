name: Update Algorithm Progress

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Count solved problems
        run: |
          HR=$(find HackerRank -type f \( -name "*.sql" -o -name "*.java" -o -name "*.py" \) 2>/dev/null | wc -l)
          LC=$(find leetcode -type f \( -name "*.sql" -o -name "*.java" -o -name "*.py" \) 2>/dev/null | wc -l)
          BJ=$(find 백준 -type f \( -name "*.sql" -o -name "*.java" -o -name "*.py" \) 2>/dev/null | wc -l)
          PG=$(find 프로그래머스 -type f \( -name "*.sql" -o -name "*.java" -o -name "*.py" \) 2>/dev/null | wc -l)

          echo "HR=$HR" >> $GITHUB_ENV
          echo "LC=$LC" >> $GITHUB_ENV
          echo "BJ=$BJ" >> $GITHUB_ENV
          echo "PG=$PG" >> $GITHUB_ENV

      - name: Update README.md
        run: |
          sed -i "s/| LeetCode    | .*/| LeetCode    | $LC      |/" README.md
          sed -i "s/| HackerRank  | .*/| HackerRank  | $HR      |/" README.md
          sed -i "s/| Baekjoon    | .*/| Baekjoon    | $BJ      |/" README.md
          sed -i "s/| Programmers | .*/| Programmers | $PG      |/" README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add README.md

          git commit -m "📊 Update solved count" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push
